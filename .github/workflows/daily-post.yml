name: Dnevni članek

on:
  schedule:
    # Jutranji predlogi: 03:45 UTC. GitHubov cron redno zamuja 1-2 uri, zato je
    # nastavljen zgodaj -- e-mail s predlogi tako pride okoli 6:00-7:30 po naši uri.
    - cron: '45 3 * * *'
  workflow_dispatch:
    inputs:
      choice:
        description: 'ID izbranega predloga iz jutranjega e-maila (prazno = takojšnja samodejna objava brez izbire)'
        required: false
        default: ''

jobs:
  # ── 1. faza (cron): pripravi tri predloge in jih pošlje Filipu po e-pošti.
  # Objavi se nič -- objava se zgodi šele, ko Filip v e-mailu klikne predlog
  # (worker /daily-post/pick sproži ta workflow z inputom choice).
  predlogi:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Pripravi tri predloge in pošlji e-mail
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: python3 tools/generate_daily_proposals.py

      - name: Commit & push predlogov
        run: |
          git config user.name  "meteorec-bot"
          git config user.email "bot@meteorec.si"
          git add tools/.daily_proposals.json
          if git diff --cached --quiet; then
            echo "Ni sprememb."
            exit 0
          fi
          git commit -m "blog: predlogi dnevnega članka $(date -u +%Y-%m-%d) [skip ci]"
          for i in 1 2 3 4 5; do
            if git push; then exit 0; fi
            echo "Push zavrnjen (poskus $i/5) -- rebase na najnovejši main in ponovni poskus …"
            git fetch origin main
            git rebase origin/main
            sleep $((i * 3))
          done
          echo "Push ni uspel po 5 poskusih." >&2
          exit 1

  # ── 2. faza (workflow_dispatch): napiše in objavi članek. Z inputom choice
  # objavi predlog, ki ga je Filip izbral v e-mailu; brez inputa deluje po
  # starem (takojšnja samodejna izbira teme in objava).
  publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      issues: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Namesti odvisnosti
        run: pip install Pillow --quiet

      - name: Generiraj dnevni članek (z lekturo)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          CHOICE: ${{ inputs.choice }}
        run: python3 tools/generate_daily_post.py --wire ${CHOICE:+--choice "$CHOICE"}

      - name: Commit & push
        id: commit
        run: |
          git config user.name  "meteorec-bot"
          git config user.email "bot@meteorec.si"
          git add blog/ blog.json sitemap.xml og/ img/ tools/.daily_post_state.json
          if git diff --cached --quiet; then
            echo "Ni sprememb."
            echo "published=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          git commit -m "blog: dnevni članek $(date -u +%Y-%m-%d) [skip ci]"
          # Druge avtomatizacije (SEO strani, zgodovina, ...) pogosto commitajo na
          # main sočasno -- brez rebase+retry non-fast-forward push redno pade
          # (opaženo: 7/9 zadnjih zagonov), izgubi generiran članek.
          for i in 1 2 3 4 5; do
            if git push; then
              echo "published=true" >> $GITHUB_OUTPUT
              exit 0
            fi
            echo "Push zavrnjen (poskus $i/5) -- rebase na najnovejši main in ponovni poskus …"
            git fetch origin main
            git rebase origin/main
            sleep $((i * 3))
          done
          echo "Push ni uspel po 5 poskusih." >&2
          exit 1

      - name: IndexNow — obvesti iskalnike o novi objavi
        if: steps.commit.outputs.published == 'true'
        run: |
          python3 - <<'PYEOF'
          import json, urllib.request, urllib.error, sys

          posts = json.load(open("blog.json", encoding="utf-8"))
          post = posts[0]
          post_url = f"https://meteorec.si{post['url']}"

          KEY = "d4e7a1b3c9f2e5d8a0b6c3f7e2d1a4b9"
          payload = json.dumps({
              "host": "meteorec.si",
              "key": KEY,
              "keyLocation": f"https://meteorec.si/{KEY}.txt",
              "urlList": [post_url, "https://meteorec.si/sitemap.xml"],
          }).encode()

          req = urllib.request.Request(
              "https://api.indexnow.org/indexnow",
              data=payload,
              headers={"Content-Type": "application/json"},
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=10) as r:
                  print(f"IndexNow: {r.status} — {post_url}")
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", "replace")[:200]
              print(f"IndexNow napaka {e.code}: {body}", file=sys.stderr)
          PYEOF

      - name: Obvesti e-naročnike o novi objavi
        if: steps.commit.outputs.published == 'true' && env.NOTIFY_SECRET != ''
        env:
          NOTIFY_SECRET: ${{ secrets.NOTIFY_SECRET }}
        run: |
          python3 - <<'PYEOF'
          import json, os, urllib.request, urllib.error, sys

          posts = json.load(open("blog.json", encoding="utf-8"))
          post = posts[0]

          payload = json.dumps({
              "secret": os.environ["NOTIFY_SECRET"],
              "post": {
                  "slug": post["slug"],
                  "title": post["title"],
                  "summary": post.get("summary", ""),
                  "url": post.get("url"),
              },
          }).encode()

          req = urllib.request.Request(
              "https://weatherireica1.filip-eremita.workers.dev/blog-subscribe/notify",
              data=payload,
              headers={
                  "Content-Type": "application/json",
                  "User-Agent": "Mozilla/5.0 (compatible; Meteorec-DailyPost/1.0; +https://meteorec.si)",
              },
              method="POST",
          )
          try:
              with urllib.request.urlopen(req, timeout=15) as r:
                  print(f"Razpošiljanje naročnikom: {r.status} — {r.read().decode()[:200]}")
          except urllib.error.HTTPError as e:
              body = e.read().decode("utf-8", "replace")[:200]
              print(f"Napaka pri razpošiljanju {e.code}: {body}", file=sys.stderr)
              sys.exit(1)
          PYEOF
