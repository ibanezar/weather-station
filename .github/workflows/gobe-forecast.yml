name: Gobarska napoved

on:
  schedule:
    - cron: '0 5 * * *'   # 5:00 UTC daily (6:00 CET / 7:00 CEST), po generate-seo-pages.yml
  workflow_dispatch:        # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate gobarska-napoved stran
        run: python3 tools/generate_gobe_page.py

      - name: Commit & push if changed
        run: |
          git config user.name  "meteorec-bot"
          git config user.email "bot@meteorec.si"
          git add gobarska-napoved/ || true
          git diff --cached --quiet && echo "Ni sprememb." && exit 0
          git commit -m "seo: posodobi gobarsko napoved $(date -u +%Y-%m-%d) [skip ci]"
          git push
