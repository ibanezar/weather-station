name: Gobarska napoved

on:
  schedule:
    - cron: '0 5 * * *'   # 5:00 UTC daily (6:00 CET / 7:00 CEST), po generate-seo-pages.yml
  workflow_dispatch:        # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install pyyaml

      - name: Izračunaj gobarski model (free + premium)
        run: python3 tools/gobe_model.py --out-premium /tmp/premium.json

      - name: Push premium JSON v Worker KV
        env:
          PREMIUM_SYNC_KEY: ${{ secrets.PREMIUM_SYNC_KEY }}
        run: |
          if [ -z "$PREMIUM_SYNC_KEY" ]; then
            echo "PREMIUM_SYNC_KEY ni nastavljen — preskočim KV push."
            exit 0
          fi
          for i in 1 2 3; do
            curl -sf -X POST "https://weatherireica1.filip-eremita.workers.dev/premium/data" \
              -H "Authorization: Bearer $PREMIUM_SYNC_KEY" \
              -H "Content-Type: application/json" \
              --data-binary @/tmp/premium.json && exit 0
            echo "Poskus $i ni uspel, čakam …"; sleep $((i * 5))
          done
          echo "::warning::Premium JSON ni bil naložen v KV (worker nedosegljiv?)"

      - name: Alarm premium naročnikom (pogoji optimalni)
        env:
          PREMIUM_SYNC_KEY: ${{ secrets.PREMIUM_SYNC_KEY }}
        run: |
          if [ -z "$PREMIUM_SYNC_KEY" ]; then
            echo "PREMIUM_SYNC_KEY ni nastavljen — preskočim alarm."
            exit 0
          fi
          # Worker sam odloči (prag + cooldown), ali dejansko pošlje.
          curl -sf -X POST "https://weatherireica1.filip-eremita.workers.dev/premium/notify" \
            -H "Authorization: Bearer $PREMIUM_SYNC_KEY" || \
            echo "::warning::Klic /premium/notify ni uspel."

      - name: Generate gobarska-napoved stran
        run: python3 tools/generate_gobe_page.py

      - name: Commit & push if changed
        run: |
          git config user.name  "meteorec-bot"
          git config user.email "bot@meteorec.si"
          git add gobarska-napoved/ || true
          git diff --cached --quiet && echo "Ni sprememb." && exit 0
          git commit -m "seo: posodobi gobarsko napoved $(date -u +%Y-%m-%d) [skip ci]"
          git push
