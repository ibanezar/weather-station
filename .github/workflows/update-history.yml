name: Posodobi history.json

on:
  schedule:
    - cron: '15 1 * * *'   # vsak dan ob 02:15 CET (01:15 UTC)
  workflow_dispatch:         # ročni zagon iz GitHub UI

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Shrani število dni pred posodobitvijo
        id: before
        run: |
          COUNT=$(python3 -c "import json; print(len(json.load(open('history.json'))))")
          echo "count=$COUNT" >> $GITHUB_OUTPUT

      - name: Posodobi tekoči mesec
        env:
          EW_APP: ${{ secrets.EW_APP }}
          EW_API: ${{ secrets.EW_API }}
          EW_MAC: ${{ secrets.EW_MAC }}
        run: |
          MONTH=$(date -u +%Y-%m)
          python3 tools/update_history.py "$MONTH"

      - name: Preveri celovitost history.json
        run: |
          MONTH=$(date -u +%Y-%m)
          python3 tools/validate_history.py "$MONTH" "${{ steps.before.outputs.count }}"

      - name: Pre-renderiraj zadnjo meritev v index.html
        run: python3 tools/inject_current_weather.py

      - name: Commit in push (samo če so spremembe)
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet history.json index.html; then
            echo "Ni novih podatkov."
          else
            MONTH=$(date -u +%Y-%m)
            git add history.json index.html
            git commit -m "chore: posodobi history.json + statično meritev za $MONTH [skip ci]"
            git push
          fi
