name: Nastavi KV namespace (COUNTER_KV)

# Enkratni pomožni workflow: ustvari (ali najde) KV namespace COUNTER_KV,
# vpiše binding v wrangler.toml in ga commita. Commit sproži deploy workerja.
# Po uspešni nastavitvi lahko to datoteko mirno izbrišeš.

on:
  workflow_dispatch:

jobs:
  setup-kv:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      BINDING: COUNTER_KV

    steps:
      - uses: actions/checkout@v4

      - name: Preveri, ali je binding že v wrangler.toml
        id: check
        run: |
          if grep -q 'binding = "COUNTER_KV"' wrangler.toml; then
            echo "already=true" >> "$GITHUB_OUTPUT"
            echo "Binding COUNTER_KV je že prisoten — nič za storiti."
          else
            echo "already=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Ustvari ali najdi KV namespace
        if: steps.check.outputs.already == 'false'
        id: kv
        run: |
          set -euo pipefail
          # wrangler doda predpono "<worker-name>-" k naslovu namespace-a
          TITLE="weatherireica1-${BINDING}"

          echo "Iščem obstoječi namespace z naslovom: $TITLE"
          LIST=$(npx --yes wrangler@3 kv namespace list 2>/dev/null || echo '[]')
          ID=$(echo "$LIST" | jq -r --arg t "$TITLE" '.[] | select(.title==$t) | .id' | head -n1)

          if [ -z "$ID" ] || [ "$ID" = "null" ]; then
            echo "Ne obstaja — ustvarjam nov namespace."
            OUT=$(npx --yes wrangler@3 kv namespace create "$BINDING")
            echo "$OUT"
            ID=$(echo "$OUT" | grep -oE '[0-9a-f]{32}' | head -n1)
          fi

          if [ -z "$ID" ]; then
            echo "::error::Nisem uspel pridobiti ID-ja KV namespace-a. Preveri, da ima CLOUDFLARE_API_TOKEN pravico Workers KV Storage: Edit."
            exit 1
          fi
          echo "KV namespace ID: $ID"
          echo "id=$ID" >> "$GITHUB_OUTPUT"

      - name: Vpiši binding v wrangler.toml in commitaj
        if: steps.check.outputs.already == 'false'
        env:
          KV_ID: ${{ steps.kv.outputs.id }}
        run: |
          set -euo pipefail
          cat >> wrangler.toml <<EOF

[[kv_namespaces]]
binding = "COUNTER_KV"
id = "${KV_ID}"
EOF
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add wrangler.toml
          git commit -m "worker: veži KV namespace COUNTER_KV za globalne obiske in všečke"
          git push
