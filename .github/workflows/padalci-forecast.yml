name: Vreme za padalce

on:
  schedule:
    - cron: '15 6 * * *'   # 6:15 UTC daily, po kakovost-zraka-forecast.yml
  workflow_dispatch:        # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate vreme-za-padalce stran
        run: python3 tools/generate_padalci_page.py

      - name: Commit & push if changed
        run: |
          git config user.name  "meteorec-bot"
          git config user.email "bot@meteorec.si"
          git add vreme-za-padalce/ || true
          git diff --cached --quiet && echo "Ni sprememb." && exit 0
          git commit -m "seo: posodobi vreme za padalce $(date -u +%Y-%m-%d) [skip ci]"
          git push
