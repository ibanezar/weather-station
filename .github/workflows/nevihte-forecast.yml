name: Nevihtna napoved

on:
  schedule:
    - cron: '30 5 * * *'   # 5:30 UTC daily, po vodostaj-forecast.yml
  workflow_dispatch:        # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate nevihte stran
        run: python3 tools/generate_nevihte_page.py

      - name: Commit & push if changed
        run: |
          git config user.name  "meteorec-bot"
          git config user.email "bot@meteorec.si"
          git add nevihte/ || true
          git diff --cached --quiet && echo "Ni sprememb." && exit 0
          git commit -m "seo: posodobi nevihtno napoved $(date -u +%Y-%m-%d) [skip ci]"
          git push
