name: Agrometeo napoved

on:
  schedule:
    - cron: '45 5 * * *'   # 5:45 UTC daily, po nevihte-forecast.yml
  workflow_dispatch:        # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate agrometeo stran
        run: python3 tools/generate_agrometeo_page.py

      - name: Commit & push if changed
        run: |
          git config user.name  "meteorec-bot"
          git config user.email "bot@meteorec.si"
          git add agrometeo/ || true
          git diff --cached --quiet && echo "Ni sprememb." && exit 0
          git commit -m "seo: posodobi agrometeo $(date -u +%Y-%m-%d) [skip ci]"
          git push
