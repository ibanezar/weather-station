name: Kakovost zraka

on:
  schedule:
    - cron: '0 6 * * *'   # 6:00 UTC daily, po agrometeo-forecast.yml
  workflow_dispatch:        # allow manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Generate kakovost-zraka stran
        run: python3 tools/generate_kakovost_zraka_page.py

      - name: Commit & push if changed
        run: |
          git config user.name  "meteorec-bot"
          git config user.email "bot@meteorec.si"
          git add kakovost-zraka/ || true
          git diff --cached --quiet && echo "Ni sprememb." && exit 0
          git commit -m "seo: posodobi kakovost zraka $(date -u +%Y-%m-%d) [skip ci]"
          git push
