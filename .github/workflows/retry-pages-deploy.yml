name: Auto-retry failed Pages deploy

# GitHub Pages občasno spodleti z izmuzljivo napako "Deployment failed, try
# again later." (build uspe, deploy korak pade). Ta workflow poskrbi, da se
# taka objava samodejno ponovi — na dva načina:
#   1) takoj ob zaključku "pages build and deployment" (workflow_run),
#   2) urniška varovalka vsakih 20 min (če dogodek iz točke 1 ne pride —
#      dostava workflow_run za dinamični Pages workflow je nezanesljiva).

on:
  workflow_run:
    workflows: ["pages build and deployment"]
    types: [completed]
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

permissions:
  actions: write

concurrency:
  group: retry-pages-deploy
  cancel-in-progress: false

jobs:
  rerun:
    runs-on: ubuntu-latest
    steps:
      - name: Po potrebi ponovi spodletelo Pages objavo
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          EVENT: ${{ github.event_name }}
          WR_ID: ${{ github.event.workflow_run.id }}
          WR_CONCL: ${{ github.event.workflow_run.conclusion }}
          WR_BRANCH: ${{ github.event.workflow_run.head_branch }}
          WR_ATTEMPT: ${{ github.event.workflow_run.run_attempt }}
        run: |
          set -euo pipefail
          MAX_ATTEMPT=5

          if [ "$EVENT" = "workflow_run" ]; then
            RUN_ID="$WR_ID"; CONCL="$WR_CONCL"; BRANCH="$WR_BRANCH"; ATTEMPT="$WR_ATTEMPT"; STATUS="completed"
          else
            # schedule / ročno: poišči zadnji "pages build and deployment" na main
            read -r RUN_ID CONCL STATUS ATTEMPT < <(gh api \
              "/repos/$REPO/actions/runs?branch=main&per_page=30" \
              --jq '[.workflow_runs[] | select(.name=="pages build and deployment")][0]
                    | "\(.id) \(.conclusion) \(.status) \(.run_attempt)"')
            BRANCH="main"
          fi

          echo "Zadnji Pages deploy: id=$RUN_ID status=$STATUS conclusion=$CONCL attempt=$ATTEMPT branch=$BRANCH"

          if [ "${STATUS:-}" != "completed" ]; then echo "Še ni zaključen — nič za storiti."; exit 0; fi
          if [ "${CONCL:-}" != "failure" ];  then echo "Ni spodletel — nič za storiti."; exit 0; fi
          if [ "${BRANCH:-}" != "main" ];    then echo "Ni main — preskočeno."; exit 0; fi
          if [ "${ATTEMPT:-1}" -ge "$MAX_ATTEMPT" ]; then echo "Že $ATTEMPT poskusov — nehamo (varovalka)."; exit 0; fi

          echo "Spodletelo — počakam 60 s, da morebitna prehodna napaka mine, nato ponovim."
          sleep 60
          gh api --method POST -H "Accept: application/vnd.github+json" \
            "/repos/$REPO/actions/runs/$RUN_ID/rerun-failed-jobs"
          echo "Ponovni zagon sprožen."
