name: Lighthouse CI

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  lighthouse:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Namesti Lighthouse CI
        run: npm install -g @lhci/cli

      - name: Zaženi Lighthouse CI
        run: lhci autorun
