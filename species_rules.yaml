# species_rules.yaml — pravila gobarskega modela po vrstah
#
# AVTOMATSKO GENERIRANO iz data/baza_gob.xlsx prek
# tools/import_species_db.py. To datoteko lahko ročno urejaš in kalibriraš —
# regeneracija jo prepiše, zato spremembe pomeni prenesti tudi v bazo ali skript.
#
# Izpeljane vrednosti (talno-temp. okno, padavinski pragovi, višina, geološka
# afiniteta, nočna ohladitev) so označene '# TODO: kalibriraj'. Neposredno iz
# baze (sezona, zračni prag, mikoriza, dvojnice, užitnost) niso.
# Zadnja regeneracija: 2026-07-17 · 51 vrst.

# Globalne uteži za izračun indeksa (0–100)
weights:
  soil_temp: 0.35        # ujemanje talne temp. z optimalnim oknom vrste
  rain_7d: 0.25          # kumulativne padavine 7 dni
  rain_14d: 0.15         # kumulativne padavine 14 dni
  soil_moisture: 0.10
  humidity: 0.08
  temp_drop: 0.07        # nočna ohladitev kot sprožilec

# Globalni kalibracijski parametri točkovanja (veljajo za vse vrste).
scoring:
  rain:
    oversat_ratio: 3.0       # TODO: kalibriraj — večkratnik praga, kjer se začne prenamočenost
    oversat_max_ratio: 6.0   # TODO: kalibriraj — večkratnik praga, kjer je upad največji
    oversat_factor: 0.5      # TODO: kalibriraj — minimalni prispevek ob ekstremni namočenosti
  soil_moisture:
    dry: 0.12                # TODO: kalibriraj — pod tem prispevek 0
    full: 0.28               # TODO: kalibriraj — nad tem polni prispevek
  humidity:
    rh_low: 60               # TODO: kalibriraj
    rh_full: 85              # TODO: kalibriraj
    dewpoint_spread_full: 2.0  # TODO: kalibriraj
  temp_drop:
    window_days: 5           # TODO: kalibriraj
    min_drop_c: 3.0          # TODO: kalibriraj
    persist_days: 4          # TODO: kalibriraj
  elevation:
    out_of_range_factor: 0.7  # TODO: kalibriraj
  # Izpeljava talno-temp. okna iz zračnega praga (soil hladnejši/dušen od zraka).
  soil_temp_from_air:
    offset_c: -1.5           # TODO: kalibriraj — zamik zrak→tla
    shoulder_c: 3.0          # TODO: kalibriraj — širina ramen trapeza
  # Ujemanje geološke afinitete vrste s terenom lokacije.
  geology:
    match_factor: 1.15       # TODO: kalibriraj — afiniteta se ujema s terenom
    mismatch_factor: 0.75    # TODO: kalibriraj — afiniteta se NE ujema
    neutral_factor: 1.0      # vrsta brez izrazite geološke preference

# Geološki tereni doline (za geo-afiniteto v izračunu po lokaciji).
terrains:
  - id: kisla
    name_sl: "Kislo/vulkansko pogorje (Smrekovec)"
    note: "Silikatna kisla tla; dobro zadržujejo vlago. Kraljestvo jurčka in žametastega gobana."
  - id: bazicna
    name_sl: "Karbonatni masivi (Golte, Menina, Raduha)"
    note: "Apnenčasta bazična tla; hitreje se sušijo. Kraljestvo marele in poletnega gobana."
  - id: vlazna
    name_sl: "Rečni logi in dolinske terase"
    note: "Stalno vlažna tla ob Savinji in Dreti. Kraljestvo smrčkov in uhljevk."

